<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Click a button to set a random page background color and see the hex value."
    />
    <title>Change Background Color</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <p class="back"><a href="../index.html">← All challenges</a></p>
    <main id="main" class="panel">
      <h1>Background Color Changer</h1>
      <button type="button" id="changeColorBtn">Change Background Color</button>
      <p id="colorDisplay">
        Current color:
        <span id="hexCode" class="hex" aria-hidden="true">#ffffff</span>
      </p>
      <p class="sr-only" id="colorAnnouncement" role="status" aria-live="polite" aria-atomic="true"></p>
    </main>
    <script src="script.js" defer></script>
  </body>
</html>
