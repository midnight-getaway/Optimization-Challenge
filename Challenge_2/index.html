<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Calculate tip amount and total bill from bill and tip percentage."
    />
    <title>Simple Tip Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <p class="back"><a href="../index.html">← All challenges</a></p>
    <main id="main" tabindex="-1">
      <h1>Tip Calculator</h1>

      <div class="form-group">
        <label for="billAmount">Bill amount ($)</label>
        <input
          type="number"
          id="billAmount"
          name="billAmount"
          placeholder="e.g. 45.00"
          step="0.01"
          min="0"
          inputmode="decimal"
          autocomplete="transaction-amount"
        />
      </div>

      <div class="form-group">
        <label for="tipPercent">Tip percentage (%)</label>
        <input
          type="number"
          id="tipPercent"
          name="tipPercent"
          placeholder="e.g. 15"
          step="0.5"
          min="0"
          inputmode="decimal"
        />
      </div>

      <button type="button" id="calculateBtn">Calculate</button>

      <p id="errorMessage" class="error" role="alert"></p>

      <div
        id="results"
        class="results"
        hidden
        role="region"
        aria-live="polite"
        aria-label="Calculation results"
      >
        <p><strong>Tip amount:</strong> $<span id="tipAmount">0.00</span></p>
        <p><strong>Total bill:</strong> $<span id="totalBill">0.00</span></p>
      </div>
    </main>
    <script src="../skip-focus.js" defer></script>
    <script src="script.js" defer></script>
  </body>
</html>
